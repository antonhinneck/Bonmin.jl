name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Bonmin system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              coinor-libbonmin-dev \
              coinor-libipopt-dev \
              coinor-libcbc-dev \
              coinor-libclp-dev \
              g++

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.9'

      - name: Install dependencies
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Build cpp_bridge using Julia's Pkg.build()
        run: julia --project=. -e 'using Pkg; Pkg.build()'

      - name: Run tests with coverage
        run: julia --project=. --code-coverage=user test/runtests.jl

      - name: Install Coverage
        run: julia --project=. -e 'using Pkg; Pkg.add("Coverage")'

      - name: Generate LCOV
        run: |
          julia --project=. -e '
          using Coverage
          cov = process_folder("src")
          LCOV.writefile("lcov.info", cov)
          '

      - name: Debug files
        run: ls -lah

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true